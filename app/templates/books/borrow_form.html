{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Borrow Book - Library Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-hand-holding me-2"></i>Borrow Book</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-book me-2"></i>
                    <strong>{{ book.title }}</strong> by {{ book.author.full_name }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-check me-2"></i>Confirm Borrow
                        </button>
                        <a href="{{ book.get_absolute_url }}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
