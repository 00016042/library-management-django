{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - Library Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card shadow-lg">
            <div class="card-header text-center py-4" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
                <i class="fas fa-user-plus fa-3x text-white mb-2"></i>
                <h3 class="text-white mb-0 fw-bold">Create Account</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-success w-100 btn-lg mt-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Already have an account?
                    <a href="{% url 'login' %}" class="text-primary fw-semibold">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
