{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Library Management System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-header text-center py-4" style="background: linear-gradient(135deg, #2c3e50, #3498db);">
                <i class="fas fa-sign-in-alt fa-3x text-white mb-2"></i>
                <h3 class="text-white mb-0 fw-bold">Welcome Back</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-primary fw-semibold">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
